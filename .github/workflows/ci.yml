name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust CLI (pinned)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      # Cargo 1.97+ applies this consistently to every rustc invocation, unlike
      # command-specific trailing `-D warnings` arguments.
      CARGO_BUILD_WARNINGS: deny
    steps:
      - uses: actions/checkout@v6

      - name: Install pinned Rust
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component rustfmt --component clippy

      - name: Check formatting
        working-directory: cli
        run: cargo +1.97.0 fmt --all -- --check

      - name: Lint
        working-directory: cli
        run: cargo +1.97.0 clippy --locked --all-targets --all-features

      - name: Test
        working-directory: cli
        run: cargo +1.97.0 test --locked --all-targets

  rust-msrv:
    name: Rust CLI (MSRV 1.91)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install minimum supported Rust
        run: rustup toolchain install 1.91.0 --profile minimal

      - name: Check minimum supported Rust
        working-directory: cli
        run: cargo +1.91.0 check --locked --all-targets --all-features

  rust-latest:
    name: Rust CLI (latest stable)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install latest stable Rust
        run: rustup toolchain install stable --profile minimal

      - name: Check forward compatibility
        working-directory: cli
        run: cargo +stable check --locked --all-targets --all-features

  rust-platforms:
    name: Rust CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      CARGO_BUILD_WARNINGS: deny
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - windows-2025
    steps:
      - uses: actions/checkout@v6

      - name: Install pinned Rust
        run: rustup toolchain install 1.97.0 --profile minimal

      - name: Check platform-specific code
        working-directory: cli
        run: cargo +1.97.0 check --locked --all-targets --all-features

  server:
    name: Android server
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-36"

      - uses: gradle/actions/setup-gradle@v6

      - name: Check, test, and assemble server APK pair
        working-directory: server
        run: |
          ./gradlew --no-daemon \
            ktlintCheck \
            :app:lintDebug \
            :app:testDebugUnitTest \
            :app:assembleDebug \
            :app:assembleDebugAndroidTest

  server-instrumented:
    name: Android server instrumentation
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run atomic file-route tests on an emulator
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          working-directory: server
          script: >-
            ./gradlew --no-daemon :app:connectedDebugAndroidTest
            -Pandroid.testInstrumentationRunnerArguments.class=io.github.andriyo.shadowdroid.routes.FileRoutesAtomicWriteTest

  agent-and-sample:
    name: In-app agent and sample app
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-36"

      - uses: gradle/actions/setup-gradle@v6

      - name: Check, test, and assemble in-app agent
        working-directory: agent
        run: |
          ./gradlew --no-daemon \
            :shadowdroid-agent:lintDebug \
            :shadowdroid-agent:testDebugUnitTest \
            :shadowdroid-agent:assembleRelease \
            :shadowdroid-agent-okhttp:lintDebug \
            :shadowdroid-agent-okhttp:testDebugUnitTest \
            :shadowdroid-agent-okhttp:assembleRelease

      - name: Stage the agent AAR used by the sample
        run: |
          mkdir -p samples/shadowdroid-test-app/shadowdroid
          cp agent/shadowdroid-agent/build/outputs/aar/shadowdroid-agent-release.aar \
            samples/shadowdroid-test-app/shadowdroid/shadowdroid-agent.aar

      - name: Check, test, and assemble sample app
        working-directory: samples/shadowdroid-test-app
        run: |
          ./gradlew --no-daemon \
            :app:lintDebug \
            :app:testDebugUnitTest \
            :app:assembleDebug

  studio-plugin:
    name: Android Studio plugin
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v6

      - name: Test and build plugin
        working-directory: shadowdroid-plugin
        run: ./gradlew --no-daemon test buildPlugin verifyPluginStructure
