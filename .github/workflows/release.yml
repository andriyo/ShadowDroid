name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apks:
    name: Build Android server APKs
    runs-on: ubuntu-24.04
    outputs:
      main_sha256: ${{ steps.checksums.outputs.main_sha256 }}
      test_sha256: ${{ steps.checksums.outputs.test_sha256 }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-36"

      - uses: gradle/actions/setup-gradle@v6

      - name: Build APK pair
        working-directory: server
        run: ./gradlew --no-daemon :app:assembleDebug :app:assembleDebugAndroidTest

      - name: Stage APK assets
        id: checksums
        shell: bash
        run: |
          mkdir -p dist
          cp server/app/build/outputs/apk/debug/app-debug.apk dist/shadowdroid-server-main.apk
          cp server/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk dist/shadowdroid-server-test.apk
          main_sha256="$(shasum -a 256 dist/shadowdroid-server-main.apk | awk '{print $1}')"
          test_sha256="$(shasum -a 256 dist/shadowdroid-server-test.apk | awk '{print $1}')"
          echo "main_sha256=$main_sha256" >> "$GITHUB_OUTPUT"
          echo "test_sha256=$test_sha256" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: android-server-apks
          path: dist/*.apk
          if-no-files-found: error

  build-cli:
    name: Build ${{ matrix.target }}
    needs: build-apks
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-15
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust target
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Build CLI
        working-directory: cli
        shell: bash
        env:
          SHADOWDROID_RELEASE_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
          SHADOWDROID_RELEASE_MAIN_APK_SHA256: ${{ needs.build-apks.outputs.main_sha256 }}
          SHADOWDROID_RELEASE_TEST_APK_SHA256: ${{ needs.build-apks.outputs.test_sha256 }}
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package CLI archive
        shell: bash
        run: |
          target="${{ matrix.target }}"
          mkdir -p package
          if [ "${{ matrix.archive }}" = "zip" ]; then
            cp "cli/target/$target/release/shadowdroid.exe" package/shadowdroid.exe
            (cd package && 7z a "../shadowdroid-$target.zip" shadowdroid.exe)
          else
            cp "cli/target/$target/release/shadowdroid" package/shadowdroid
            (cd package && tar -czf "../shadowdroid-$target.tar.gz" shadowdroid)
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.target }}
          path: shadowdroid-${{ matrix.target }}.*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - build-apks
      - build-cli
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: downloaded

      - name: Stage release assets
        shell: bash
        run: |
          mkdir -p dist
          find downloaded -maxdepth 3 -type f -exec cp {} dist/ \;
          cp scripts/install.sh dist/shadowdroid-installer.sh
          cp scripts/install.ps1 dist/shadowdroid-installer.ps1
          chmod +x dist/shadowdroid-installer.sh
          (
            cd dist
            rm -f SHA256SUMS
            for f in $(find . -maxdepth 1 -type f ! -name SHA256SUMS -print | sed 's#^\./##' | sort); do
              shasum -a 256 "$f"
            done > SHA256SUMS
          )

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          ShadowDroid ${GITHUB_REF_NAME}

          Install macOS/Linux:

              curl --proto '=https' --tlsv1.2 -LsSf https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/shadowdroid-installer.sh | sh

          Install Windows PowerShell:

              powershell -ExecutionPolicy Bypass -c "irm https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/shadowdroid-installer.ps1 | iex"

          Run:

              shadowdroid connect
          EOF

      - name: Create or update release
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --verify-tag \
              --title "ShadowDroid $tag" \
              --notes-file release-notes.md
          fi

  smoke-installers:
    name: Smoke installer on ${{ matrix.os }}
    needs: publish
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Smoke macOS/Linux installer
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          installer="$RUNNER_TEMP/shadowdroid-installer.sh"
          install_dir="$RUNNER_TEMP/shadowdroid-bin"
          curl --proto '=https' --tlsv1.2 -fsSL \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/shadowdroid-installer.sh" \
            -o "$installer"
          sh "$installer" --version "$GITHUB_REF_NAME" --install-dir "$install_dir"
          "$install_dir/shadowdroid" --version | grep "shadowdroid ${GITHUB_REF_NAME#v}"
          sh "$installer" --install-dir "$install_dir" --uninstall
          test ! -e "$install_dir/shadowdroid"

      - name: Smoke Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Join-Path $env:RUNNER_TEMP "shadowdroid-installer.ps1"
          $installDir = Join-Path $env:RUNNER_TEMP "shadowdroid-bin"
          Invoke-WebRequest `
            -Uri "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:GITHUB_REF_NAME/shadowdroid-installer.ps1" `
            -OutFile $installer
          powershell -ExecutionPolicy Bypass -File $installer -Version $env:GITHUB_REF_NAME -InstallDir $installDir -NoPathUpdate
          & (Join-Path $installDir "shadowdroid.exe") --version | Select-String "shadowdroid $($env:GITHUB_REF_NAME.TrimStart('v'))"
          powershell -ExecutionPolicy Bypass -File $installer -InstallDir $installDir -Uninstall
          if (Test-Path (Join-Path $installDir "shadowdroid.exe")) {
            throw "shadowdroid.exe still exists after uninstall"
          }

  update-package-managers:
    name: Update package-manager repos
    needs: smoke-installers
    runs-on: ubuntu-24.04
    env:
      PACKAGE_BOT_TOKEN: ${{ secrets.SHADOWDROID_PACKAGE_BOT_TOKEN }}
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Skip when package token is not configured
        if: env.PACKAGE_BOT_TOKEN == ''
        run: |
          echo "Set SHADOWDROID_PACKAGE_BOT_TOKEN to auto-update andriyo/homebrew-tap and andriyo/scoop-bucket."

      - uses: actions/checkout@v6
        if: env.PACKAGE_BOT_TOKEN != ''
        with:
          path: shadowdroid

      - uses: actions/checkout@v6
        if: env.PACKAGE_BOT_TOKEN != ''
        with:
          repository: andriyo/homebrew-tap
          path: homebrew-tap
          token: ${{ env.PACKAGE_BOT_TOKEN }}

      - uses: actions/checkout@v6
        if: env.PACKAGE_BOT_TOKEN != ''
        with:
          repository: andriyo/scoop-bucket
          path: scoop-bucket
          token: ${{ env.PACKAGE_BOT_TOKEN }}

      - name: Download release checksums
        if: env.PACKAGE_BOT_TOKEN != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern SHA256SUMS \
            --dir "$RUNNER_TEMP"

      - name: Rewrite package metadata
        if: env.PACKAGE_BOT_TOKEN != ''
        run: |
          python3 shadowdroid/scripts/update-package-managers.py \
            --version "$RELEASE_TAG" \
            --checksums "$RUNNER_TEMP/SHA256SUMS" \
            --homebrew-path homebrew-tap \
            --scoop-path scoop-bucket

      - name: Push Homebrew tap update
        if: env.PACKAGE_BOT_TOKEN != ''
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/shadowdroid.rb; then
            echo "Homebrew formula already up to date."
          else
            git add Formula/shadowdroid.rb
            git commit -m "Bump ShadowDroid formula to ${RELEASE_TAG#v}"
            git push
          fi

      - name: Push Scoop bucket update
        if: env.PACKAGE_BOT_TOKEN != ''
        working-directory: scoop-bucket
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- bucket/shadowdroid.json; then
            echo "Scoop manifest already up to date."
          else
            git add bucket/shadowdroid.json
            git commit -m "Bump ShadowDroid manifest to ${RELEASE_TAG#v}"
            git push
          fi
